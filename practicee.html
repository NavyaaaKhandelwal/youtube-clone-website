<style>
.button1{
    background-color: green;
    border: none;
    color: white;
    font-size: 20px;
    padding-left: 15px;
    padding-right: 15px;
    padding-top: 7px;
    padding-bottom: 7px;
    cursor: pointer;
    vertical-align: top;
    transition: padding-left 0.5s, padding-right 0.5s, padding-top 0.5s, padding-bottom 0.5s;
}
.button1:hover {
    padding-left: 40px;
    padding-right: 40px;
    padding-top: 20px;
    padding-bottom: 20px;
}
.button2{
    background-color: green;
    border: none;
    color: white;
    font-size: 20px;
    padding-left: 15px;
    padding-right: 15px;
    padding-top: 7px;
    padding-bottom: 7px;
    cursor: pointer;
    vertical-align: top;
    box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.3);
}
.button2:active {
    margin-top: 5px ;
    margin-left: 5px;
    box-shadow: 0px 0px 0px rgba(0,0,0,0);
}
</style>
<button class="button1">Stretch</button>

<button class="button2">Shadow</button>
